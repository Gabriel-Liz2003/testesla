// Rating formula do documento
function calcRatingStatic(p) {
  const byRole = PLAYERS_BASE ? PLAYERS_BASE.filter(x=>x.role===p.role) : [p];
  return parseFloat(calcRating(p, byRole.length>0?byRole:[p]));
}
function calcRating(p, peers) {
  const norm = (v, arr, k) => {
    const vals = arr.map(x=>x[k]);
    const mn=Math.min(...vals), mx=Math.max(...vals);
    return mx===mn?0.5:(v-mn)/(mx-mn);
  };
  const s = norm(p.kda,peers,"kda")*0.30 + norm(p.kp,peers,"kp")*0.20 +
            norm(p.dpm,peers,"dpm")*0.20 + norm(p.csmin,peers,"csmin")*0.15 +
            norm(p.wr,peers,"wr")*0.10 + (p.wr>60?0.05:0);
  return Math.max(1,Math.min(10,(s*8.5+1))).toFixed(1);
}

async function lolesports(ep, qs="") {
  const url = `${LOL_BASE}${ep}?hl=pt-BR${qs}`;
  const r = await fetch(`${CORS}${encodeURIComponent(url)}`, {headers:{"x-api-key":LOL_KEY}});
  if(!r.ok) throw new Error(r.status);
  return r.json();
}
async function wiki(params) {
  const r = await fetch(`${WIKI}?${params}&format=json&origin=*`);
  if(!r.ok) throw new Error(r.status);
  return r.json();
}

// Parse LoL Esports schedule
function parseSched(data) {
  return (data?.data?.schedule?.events||[])
    .filter(e=>e.type==="match")
    .map(e=>{
      const m=e.match, t1=m.teams[0], t2=m.teams[1];
      const tkey=(code)=>Object.keys(TEAMS).find(k=>TEAMS[k].short===code)||code?.toLowerCase();
      return {
        id:m.id, t1:tkey(t1.code), t2:tkey(t2.code),
        t1code:t1.code, t2code:t2.code,
        s1:t1.result?.gameWins||0, s2:t2.result?.gameWins||0,
        status:e.state, date:e.startTime,
        label:e.blockName||"CBLOL 2026 Split 1",
        bo:m.strategy?.count||3
      };
    });
}

// Parse standings
function parseStandings(data) {
  const stages=data?.data?.standings?.[0]?.stages||[];
  const stage=stages.find(s=>s.type==="regular_season")||stages[0];
  if(!stage) return null;
  return (stage.sections||[]).flatMap(s=>s.rankings||[])
    .flatMap(r=>r.teams||[])
    .map(t=>({
      team: Object.keys(TEAMS).find(k=>TEAMS[k].short===t.code)||t.code?.toLowerCase(),
      code:t.code, w:t.record?.wins||0, l:t.record?.losses||0
    }));
}

// Leaguepedia stats
async function fetchWikiStats() {
  const p = new URLSearchParams({
    action:"cargoquery", tables:"ScoreboardPlayers",
    fields:"Link,Team,Role,Kills,Deaths,Assists,CS,DamageToChampions,Gamelength",
    where:"Tournament LIKE 'CBLOL/2026 Season/Split 1%'",
    limit:"500"
  });
  const d = await wiki(p.toString());
  const rows = d?.cargoquery||[];
  if(!rows.length) return null;
  const map={};
  rows.forEach(r=>{
    const d=r.title; if(!d?.Link) return;
    const k=d.Link;
    if(!map[k]) map[k]={name:d.Link,team:d.Team,role:(d.Role||"").toLowerCase(),k:0,d:0,a:0,cs:0,dmg:0,gl:0,g:0};
    const p=map[k];
    p.k+=+d.Kills||0; p.d+=+d.Deaths||0; p.a+=+d.Assists||0;
    p.cs+=+d.CS||0; p.dmg+=+d.DamageToChampions||0;
    p.gl+=parseFloat(d.Gamelength||0); p.g++;
  });
  return Object.values(map).filter(p=>p.g>=1).map(p=>{
    const mpm=p.gl/p.g/60||30;
    return {
      n:p.name, team:Object.keys(TEAMS).find(k=>TEAMS[k].name===p.team)||p.team?.toLowerCase()||"?",
      role:p.role, kda:p.d?+((p.k+p.a)/p.d).toFixed(2):p.k+p.a,
      dpm:Math.round(p.dmg/p.g/mpm), kp:0, csmin:+(p.cs/p.g/mpm).toFixed(1), wr:50, rating:0, games:p.g
    };
  });
}

// ===================== UTILS ======================
const RI={top:"🗡️",jungle:"🌲",mid:"✨",bot:"🏹",support:"🛡️"};
function fmtDate(s){const d=new Date(s);return d.toLocaleString("pt-BR",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"});}
function fmtShort(s){const d=new Date(s);return d.toLocaleString("pt-BR",{day:"2-digit",month:"short",year:"numeric"});}
function ti(k){return TEAMS[k]||{name:k,short:(k||"?").toUpperCase().slice(0,4),color:"#9ca3af",emoji:"🎮",roster:[]};}
function rc(r){r=parseFloat(r);return r>=9?"text-yellow-300":r>=8?"text-yellow-400":r>=7?"text-green-400":r>=6?"text-blue-400":"text-gray-400";}
function badge(s){
  if(s==="inProgress"||s==="live") return`<span class="live-pulse bg-red-600 text-white text-[10px] font-bold px-2 py-0.5 rounded-full">🔴 AO VIVO</span>`;
  if(s==="completed"||s==="unneeded") return`<span class="bg-gray-700 text-gray-300 text-[10px] px-2 py-0.5 rounded-full">Encerrado</span>`;
  return`<span class="bg-blue-900 text-blue-300 text-[10px] px-2 py-0.5 rounded-full">Agendado</span>`;
}
function loading(on){document.getElementById("spin").classList.toggle("hidden",!on);}
function toast(msg,ms=2500){const t=document.createElement("div");t.className="toast";t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),ms);}
function closeModal(){document.getElementById("modal").classList.add("hidden");document.body.style.overflow="";}
document.getElementById("modal").addEventListener("click",function(e){if(e.target===this)closeModal();});

// ===================== RENDER ======================
function matchCard(m) {
  const t1=ti(m.t1), t2=ti(m.t2);
  const done=m.status==="completed"||m.status==="unneeded";
  const live=m.status==="inProgress"||m.status==="live";
  const sc = done
    ? `<span class="font-black text-xl" style="color:${m.s1>m.s2?t1.color:"#4b5563"}">${m.s1}</span><span class="text-gray-600 mx-1 text-sm">x</span><span class="font-black text-xl" style="color:${m.s2>m.s1?t2.color:"#4b5563"}">${m.s2}</span>`
    : live ? `<span class="live-pulse text-red-500 font-black text-lg">⚡</span>`
    : `<span class="text-gray-500 text-sm font-medium">vs</span>`;
  const d = m.label ? `<span class="text-[10px] text-gray-500">${m.label} · BO${m.bo||3} · ${fmtDate(m.date)}</span>` : `<span class="text-[10px] text-gray-500">${fmtDate(m.date)}</span>`;
  return `<div class="card mcard p-3" onclick='openMatch(${JSON.stringify(m)})'>
    <div class="flex items-center justify-between mb-2">${d}${badge(m.status)}</div>
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-2 flex-1"><span class="text-xl">${t1.emoji}</span><span class="font-bold text-sm" style="color:${t1.color}">${t1.short}</span></div>
      <div class="flex items-center gap-0.5 mx-2 min-w-[56px] justify-center">${sc}</div>
      <div class="flex items-center gap-2 flex-1 justify-end"><span class="font-bold text-sm" style="color:${t2.color}">${t2.short}</span><span class="text-xl">${t2.emoji}</span></div>
    </div>
  </div>`;
}

function renderHome() {
  // Live banner
  const live = S.schedule.filter(m=>m.status==="inProgress"||m.status==="live");
  const lb = document.getElementById("live-bar");
  if(live.length){
    document.getElementById("live-txt").textContent=`${ti(live[0].t1).short} vs ${ti(live[0].t2).short}`;
    lb.classList.remove("hidden");
  } else lb.classList.add("hidden");

  // Standings
  const st = S.standings.length ? S.standings : COPA_STANDINGS;
  let th=`<div class="overflow-x-auto"><table class="w-full text-xs"><thead><tr class="border-b border-gray-800">
    <th class="text-left py-2 px-3 text-gray-500">#</th><th class="text-left py-2 px-3 text-gray-500">Time</th>
    <th class="text-center py-2 px-3 text-gray-500">V</th><th class="text-center py-2 px-3 text-gray-500">D</th>
    <th class="text-right py-2 px-3 text-gray-500">%</th></tr></thead><tbody>`;
  st.forEach((s,i)=>{
    const t=ti(s.team); const total=s.w+s.l; const pct=total?Math.round(s.w/total*100):0;
    const bg=i===0?"bg-yellow-500/10":i<4?"bg-green-900/20":"";
    th+=`<tr class="border-b border-gray-900 ${bg}">
      <td class="py-2 px-3 font-bold ${i<4?"text-green-400":"text-gray-500"}">${i+1}</td>

  });

  const sched = S.schedule.length ? S.schedule : [];
  const up = sched.filter(m=>m.status==="unstarted"||m.status==="scheduled").slice(0,3);

    ? up.map(matchCard).join("")
    : `<div class="card p-4 text-center text-gray-500 text-sm">Nenhum jogo agendado.</div>`;

  // Results — prioriza Split 1, fallback Copa
  const done = sched.filter(m=>m.status==="completed"||m.status==="unneeded").slice(-4).reverse();
  const fallbackDone = COPA_RESULTS.slice(-4).reverse();
  const toShow = done.length ? done : fallbackDone;

function renderAgenda() {
  const sched = S.schedule.length ? S.schedule : COPA_RESULTS;
  let filtered;
  if(S.agF==="live")  filtered=sched.filter(m=>m.status==="inProgress"||m.status==="live");
  else if(S.agF==="done") filtered=sched.filter(m=>m.status==="completed"||m.status==="unneeded").reverse();
  else filtered=sched.filter(m=>m.status==="unstarted"||m.status==="scheduled");
  if(!filtered.length && S.agF==="done" && !S.schedule.length) filtered=[...COPA_RESULTS].reverse();
  document.getElementById("d-agenda").innerHTML=filtered.length
    ? filtered.map(matchCard).join("")
    : `<div class="card p-4 text-center text-gray-500 text-sm">${S.agF==="live"?"Nenhuma partida ao vivo.":"Nenhuma partida encontrada."}</div>`;

function agFilter(f){
  S.agF=f;
  ["up","live","done"].forEach(x=>{

// ===================== LOAD DATA ======================
async function loadLive() {
  try {
    const data = await lolesports("/getSchedule",`&leagueId=${CBLOL_ID}`);
    const parsed = parseSched(data);
    if(parsed.length){S.schedule=parsed;return true;}
  } catch(e){console.warn("LoL Esports schedule:",e.message);}
  return false;
}
async function loadStandings() {
  try {
    const tourns = await lolesports("/getTournamentsForLeague",`&leagueId=${CBLOL_ID}`);
    const list = tourns?.data?.leagues?.[0]?.tournaments||[];
    const cur = list[list.length-1];
    if(!cur) throw new Error("no tournament");
    const stData = await lolesports("/getStandings",`&tournamentId=${cur.id}`);
    const parsed = parseStandings(stData);
    if(parsed?.length){S.standings=parsed;return true;}
  } catch(e){console.warn("Standings:",e.message);}
  return false;
}
async function loadWikiStats() {
  try {
    const players = await fetchWikiStats();
    if(players?.length){
      players.forEach(p=>{
        const peers=players.filter(x=>x.role===p.role);
        p.rating=calcRating(p,peers);
      });
      players.sort((a,b)=>parseFloat(b.rating)-parseFloat(a.rating));
      S.wikiPlayers=players; return true;
    }
  } catch(e){console.warn("Leaguepedia:",e.message);}
  return false;
}

async function refresh() {
  loading(true);
  toast("🔄 Buscando dados ao vivo...");
  const [a,b,c] = await Promise.allSettled([loadLive(),loadStandings(),loadWikiStats()]);
  loading(false);
  renderHome();
  // refresh current visible section
  const cur=["agenda","times","stats","noticias"].find(s=>!document.getElementById(`s-${s}`).classList.contains("hidden"));
  if(cur==="agenda") renderAgenda();
  if(cur==="times")  renderTimes();
  if(cur==="stats")  renderStats();
  const ok=(a.value||b.value||c.value);
  toast(ok?"✅ Dados atualizados!":"⚠️ Usando dados locais (APIs indisponíveis)");
  document.getElementById("upd").textContent=new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
}

// Auto-refresh: a cada 2min se há jogo ao vivo, senão a cada 10min
function scheduleRefresh(){
  const hasLive=S.schedule.some(m=>m.status==="inProgress"||m.status==="live");
  setTimeout(async ()=>{await refresh();scheduleRefresh();}, hasLive?2*60*1000:10*60*1000);
}

  scheduleRefresh();
})();
