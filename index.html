<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0e1a" />
  <title>CBLOL Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Inter', sans-serif; box-sizing: border-box; }
    body { background: #0a0e1a; color: #e2e8f0; }
    .gold { color: #c89b3c; }
    .gold-bg { background: #c89b3c; }
    .card { background: #111827; border: 1px solid #1f2937; border-radius: 12px; }
    .nav-active { color: #c89b3c; border-bottom: 2px solid #c89b3c; }
    .live-badge { animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .tab-active { background: #c89b3c; color: #0a0e1a; font-weight: 700; }
    .tab-inactive { background: #1f2937; color: #9ca3af; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: #111827; }
    ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
    .champion-icon { width:36px;height:36px;border-radius:6px;object-fit:cover;border:1px solid #374151; }
    .team-logo { width:32px;height:32px;object-fit:contain; }
    .section-hidden { display: none; }
    .player-row:hover { background: #1f2937; }
    .match-card:hover { border-color: #c89b3c33; }
    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  </style>
</head>
<body class="min-h-screen">

<!-- TOP NAV -->
<nav class="sticky top-0 z-50 bg-[#0a0e1a] border-b border-[#1f2937] px-4 py-3 flex items-center justify-between">
  <div class="flex items-center gap-2">
    <span class="text-2xl">🏆</span>
    <span class="font-black text-lg tracking-tight gold">CBLOL</span>
    <span class="font-light text-sm text-gray-400 hidden sm:inline">Hub 2026</span>
  </div>
  <div class="flex items-center gap-1">
    <div id="loading-indicator" class="hidden w-4 h-4 border-2 border-yellow-500 border-t-transparent rounded-full spin"></div>
    <span id="last-updated" class="text-xs text-gray-500"></span>
  </div>
</nav>

<!-- BOTTOM TABS -->
<div class="fixed bottom-0 left-0 right-0 z-50 bg-[#0a0e1a] border-t border-[#1f2937] flex">
  <button onclick="showSection('home')" id="tab-home" class="flex-1 py-3 flex flex-col items-center gap-0.5 text-xs tab-active rounded-none">
    <span class="text-lg">🏠</span><span>Home</span>
  </button>
  <button onclick="showSection('agenda')" id="tab-agenda" class="flex-1 py-3 flex flex-col items-center gap-0.5 text-xs tab-inactive rounded-none">
    <span class="text-lg">📅</span><span>Agenda</span>
  </button>
  <button onclick="showSection('times')" id="tab-times" class="flex-1 py-3 flex flex-col items-center gap-0.5 text-xs tab-inactive rounded-none">
    <span class="text-lg">🛡️</span><span>Times</span>
  </button>
  <button onclick="showSection('jogadores')" id="tab-jogadores" class="flex-1 py-3 flex flex-col items-center gap-0.5 text-xs tab-inactive rounded-none">
    <span class="text-lg">⚔️</span><span>Jogadores</span>
  </button>
  <button onclick="showSection('noticias')" id="tab-noticias" class="flex-1 py-3 flex flex-col items-center gap-0.5 text-xs tab-inactive rounded-none">
    <span class="text-lg">📰</span><span>Notícias</span>
  </button>
</div>

<!-- MAIN CONTENT -->
<main class="pb-24 pt-2 max-w-2xl mx-auto px-3">

  <!-- ===== HOME ===== -->
  <section id="section-home">
    <!-- Classificação -->
    <div class="mt-3 mb-4">
      <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2">Classificação</h2>
      <div id="standings-container" class="card p-0 overflow-hidden">
        <div class="p-4 text-center text-gray-500 text-sm">Carregando...</div>
      </div>
    </div>
    <!-- Próximos Jogos -->
    <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2">Próximos Jogos</h2>
    <div id="upcoming-container" class="space-y-2 mb-4">
      <div class="card p-4 text-center text-gray-500 text-sm">Carregando...</div>
    </div>
    <!-- Últimos Resultados -->
    <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2">Últimos Resultados</h2>
    <div id="results-container" class="space-y-2 mb-4">
      <div class="card p-4 text-center text-gray-500 text-sm">Carregando...</div>
    </div>
  </section>

  <!-- ===== AGENDA ===== -->
  <section id="section-agenda" class="section-hidden">
    <div class="flex gap-2 mt-3 mb-4">
      <button onclick="setAgendaFilter('upcoming')" id="filter-upcoming" class="tab-active px-4 py-1.5 rounded-full text-sm">Próximos</button>
      <button onclick="setAgendaFilter('completed')" id="filter-completed" class="tab-inactive px-4 py-1.5 rounded-full text-sm">Resultados</button>
    </div>
    <div id="agenda-container" class="space-y-2"></div>
  </section>

  <!-- ===== TIMES ===== -->
  <section id="section-times" class="section-hidden">
    <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-widest mt-3 mb-3">Times CBLOL 2026</h2>
    <div id="times-container" class="space-y-2">
      <div class="card p-4 text-center text-gray-500 text-sm">Carregando...</div>
    </div>
  </section>

  <!-- ===== JOGADORES ===== -->
  <section id="section-jogadores" class="section-hidden">
    <div class="flex gap-2 mt-3 mb-3 overflow-x-auto pb-1">
      <button onclick="filterPlayers('all')" id="pos-all" class="tab-active px-3 py-1.5 rounded-full text-xs whitespace-nowrap">Todos</button>
      <button onclick="filterPlayers('top')" id="pos-top" class="tab-inactive px-3 py-1.5 rounded-full text-xs whitespace-nowrap">Top</button>
      <button onclick="filterPlayers('jungle')" id="pos-jungle" class="tab-inactive px-3 py-1.5 rounded-full text-xs whitespace-nowrap">Jungle</button>
      <button onclick="filterPlayers('mid')" id="pos-mid" class="tab-inactive px-3 py-1.5 rounded-full text-xs whitespace-nowrap">Mid</button>
      <button onclick="filterPlayers('adc')" id="pos-adc" class="tab-inactive px-3 py-1.5 rounded-full text-xs whitespace-nowrap">ADC</button>
      <button onclick="filterPlayers('support')" id="pos-support" class="tab-inactive px-3 py-1.5 rounded-full text-xs whitespace-nowrap">Support</button>
    </div>
    <div id="players-container" class="card overflow-hidden">
      <div class="p-4 text-center text-gray-500 text-sm">Carregando...</div>
    </div>
  </section>

  <!-- ===== NOTÍCIAS ===== -->
  <section id="section-noticias" class="section-hidden">
    <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-widest mt-3 mb-3">Notícias</h2>
    <div id="news-container" class="space-y-3">
      <div class="card p-4 text-center text-gray-500 text-sm">Carregando...</div>
    </div>
  </section>

</main>

<!-- MATCH DETAIL MODAL -->
<div id="match-modal" class="hidden fixed inset-0 z-50 bg-black/80 overflow-y-auto">
  <div class="min-h-screen flex items-start justify-center p-3 pt-8">
    <div class="card w-full max-w-lg relative">
      <button onclick="closeModal()" class="absolute top-3 right-3 text-gray-400 hover:text-white text-2xl z-10">✕</button>
      <div id="modal-content" class="p-4"></div>
    </div>
  </div>
</div>

<script>
// ==================== DATA ====================
const TEAMS = {
  "loud": { name:"LOUD", short:"LOUD", color:"#FF6B00", emoji:"🔊", roster:[
    {name:"Robo", role:"top"},{name:"Croc", role:"jungle"},{name:"Tinowns", role:"mid"},{name:"Route", role:"adc"},{name:"RedBert", role:"support"}
  ]},
  "red": { name:"RED Canids", short:"RED", color:"#FF0040", emoji:"🐺", roster:[
    {name:"Guigo", role:"top"},{name:"Aegis", role:"jungle"},{name:"Grevthar", role:"mid"},{name:"Netuno", role:"adc"},{name:"Jojo", role:"support"}
  ]},
  "fluxo": { name:"Fluxo Sharks", short:"FLX", color:"#00C2FF", emoji:"🦈", roster:[
    {name:"Wizer", role:"top"},{name:"Ayu", role:"jungle"},{name:"dyNquedo", role:"mid"},{name:"Disamis", role:"adc"},{name:"Avenger", role:"support"}
  ]},
  "pain": { name:"paiN Gaming", short:"PNG", color:"#552FAC", emoji:"💜", roster:[
    {name:"Cariok", role:"top"},{name:"Gigas", role:"jungle"},{name:"CarioK", role:"mid"},{name:"Luci", role:"adc"},{name:"Shrimp", role:"support"}
  ]},
  "vivo": { name:"VIVO Keyd Stars", short:"VKS", color:"#00E676", emoji:"⭐", roster:[
    {name:"Guigo", role:"top"},{name:"Leko", role:"jungle"},{name:"Yang", role:"mid"},{name:"Envy", role:"adc"},{name:"Tefa", role:"support"}
  ]},
  "furia": { name:"FURIA Esports", short:"FUR", color:"#FFFFFF", emoji:"🐾", roster:[
    {name:"Tay", role:"top"},{name:"Niyaz", role:"jungle"},{name:"Tutsz", role:"mid"},{name:"Ayu", role:"adc"},{name:"Goot", role:"support"}
  ]},
  "kabum": { name:"KaBuM! e-Sports", short:"KBM", color:"#FF6600", emoji:"💥", roster:[
    {name:"Hidan", role:"top"},{name:"Geas", role:"jungle"},{name:"Yel", role:"mid"},{name:"Sirtax", role:"adc"},{name:"Kuri", role:"support"}
  ]},
  "intz": { name:"INTZ", short:"INTZ", color:"#1DA1F2", emoji:"🔵", roster:[
    {name:"Erizef", role:"top"},{name:"Fxsh", role:"jungle"},{name:"Nyu", role:"mid"},{name:"Aster", role:"adc"},{name:"Aegis", role:"support"}
  ]}
};

const ROLE_ICON = {top:"🗡️", jungle:"🌲", mid:"✨", adc:"🏹", support:"🛡️"};

// Simulated schedule (realistic structure)
const MATCHES = [
  {id:"m1", t1:"loud", t2:"red", s1:2, s2:0, status:"completed", date:"2026-05-10T16:00", week:1, phase:"Fase Regular"},
  {id:"m2", t1:"fluxo", t2:"pain", s1:1, s2:2, status:"completed", date:"2026-05-10T18:00", week:1, phase:"Fase Regular"},
  {id:"m3", t1:"vivo", t2:"furia", s1:2, s2:1, status:"completed", date:"2026-05-11T16:00", week:1, phase:"Fase Regular"},
  {id:"m4", t1:"kabum", t2:"intz", s1:0, s2:2, status:"completed", date:"2026-05-11T18:00", week:1, phase:"Fase Regular"},
  {id:"m5", t1:"loud", t2:"fluxo", s1:0, s2:0, status:"scheduled", date:"2026-05-17T16:00", week:2, phase:"Fase Regular"},
  {id:"m6", t1:"red", t2:"vivo", s1:0, s2:0, status:"scheduled", date:"2026-05-17T18:00", week:2, phase:"Fase Regular"},
  {id:"m7", t1:"pain", t2:"furia", s1:0, s2:0, status:"scheduled", date:"2026-05-18T16:00", week:2, phase:"Fase Regular"},
  {id:"m8", t1:"kabum", t2:"loud", s1:0, s2:0, status:"scheduled", date:"2026-05-18T18:00", week:2, phase:"Fase Regular"},
];

const STANDINGS = [
  {team:"loud", w:3, l:0, pts:9},
  {team:"intz", w:2, l:1, pts:6},
  {team:"vivo", w:2, l:1, pts:6},
  {team:"pain", w:2, l:1, pts:6},
  {team:"red", w:1, l:2, pts:3},
  {team:"fluxo", w:1, l:2, pts:3},
  {team:"furia", w:1, l:2, pts:3},
  {team:"kabum", w:0, l:3, pts:0},
];

const PLAYERS_STATS = [
  {name:"Tinowns", team:"loud", role:"mid", kda:8.4, dpm:642, kp:71, csmin:8.9, wr:75, rating:9.2},
  {name:"Route", team:"loud", role:"adc", kda:6.8, dpm:598, kp:68, csmin:9.1, wr:75, rating:8.8},
  {name:"Netuno", team:"red", role:"adc", kda:5.9, dpm:561, kp:64, csmin:8.7, wr:42, rating:7.9},
  {name:"dyNquedo", team:"fluxo", role:"mid", kda:5.1, dpm:512, kp:59, csmin:8.3, wr:38, rating:7.4},
  {name:"Croc", team:"loud", role:"jungle", kda:4.8, dpm:320, kp:78, csmin:5.9, wr:75, rating:8.1},
  {name:"Aegis", team:"red", role:"jungle", kda:4.3, dpm:298, kp:72, csmin:5.7, wr:42, rating:7.2},
  {name:"Robo", team:"loud", role:"top", kda:4.1, dpm:489, kp:55, csmin:8.0, wr:75, rating:8.0},
  {name:"RedBert", team:"loud", role:"support", kda:5.5, dpm:180, kp:80, csmin:1.2, wr:75, rating:7.8},
  {name:"Erizef", team:"intz", role:"top", kda:3.8, dpm:445, kp:58, csmin:7.8, wr:62, rating:7.5},
  {name:"Nyu", team:"intz", role:"mid", kda:5.2, dpm:530, kp:65, csmin:8.5, wr:62, rating:7.9},
  {name:"Goot", team:"furia", role:"support", kda:4.9, dpm:160, kp:76, csmin:1.0, wr:38, rating:6.8},
  {name:"Tutsz", team:"furia", role:"mid", kda:4.5, dpm:490, kp:62, csmin:8.1, wr:38, rating:7.1},
].sort((a,b) => b.rating - a.rating);

const NEWS = [
  {id:"n1", title:"LOUD vence RED Canids 2-0 na semana 1 do CBLOL 2026", summary:"Time de Tinowns domina a partida e confirma favoritismo para o Split 1.", category:"Resultados", date:"2026-05-10", img:"https://via.placeholder.com/400x200/0a0e1a/c89b3c?text=LOUD+2+x+0+RED"},
  {id:"n2", title:"INTZ surpreende KaBuM! e assume top 2", summary:"Renovada, INTZ mostra evolução e preocupa os favoritos do campeonato.", category:"Análises", date:"2026-05-11", img:"https://via.placeholder.com/400x200/0a0e1a/1DA1F2?text=INTZ+Surpresa"},
  {id:"n3", title:"paiN Gaming anuncia renovação com Gigas até fim de 2027", summary:"Jungler confirma contrato e equipe planeja longa parceria.", category:"Transfers", date:"2026-05-09", img:"https://via.placeholder.com/400x200/0a0e1a/552FAC?text=paiN+Gaming"},
  {id:"n4", title:"Semana 2 do CBLOL começa neste sábado com LOUD x Fluxo", summary:"Duelo promete ser o clássico da rodada com as duas melhores equipes se enfrentando.", category:"Agenda", date:"2026-05-12", img:"https://via.placeholder.com/400x200/0a0e1a/00C2FF?text=Semana+2"},
];

// ==================== STATE ====================
let currentSection = "home";
let agendaFilter = "upcoming";
let playerFilter = "all";

// ==================== UTILS ====================
function formatDate(dateStr) {
  const d = new Date(dateStr);
  return d.toLocaleString("pt-BR", {day:"2-digit", month:"short", hour:"2-digit", minute:"2-digit"});
}
function formatDateShort(dateStr) {
  const d = new Date(dateStr);
  return d.toLocaleString("pt-BR", {day:"2-digit", month:"short"});
}
function ratingColor(r) {
  if (r >= 8.5) return "text-yellow-400";
  if (r >= 7.5) return "text-green-400";
  if (r >= 6.5) return "text-blue-400";
  return "text-gray-400";
}
function statusBadge(status) {
  if (status === "live") return `<span class="live-badge bg-red-600 text-white text-[10px] font-bold px-2 py-0.5 rounded-full">AO VIVO</span>`;
  if (status === "completed") return `<span class="bg-gray-700 text-gray-300 text-[10px] px-2 py-0.5 rounded-full">Encerrado</span>`;
  return `<span class="bg-blue-900 text-blue-300 text-[10px] px-2 py-0.5 rounded-full">Agendado</span>`;
}

// ==================== RENDER FUNCTIONS ====================

function renderMatchCard(m, showScore=true) {
  const t1 = TEAMS[m.t1], t2 = TEAMS[m.t2];
  const scoreHtml = m.status === "completed"
    ? `<span class="font-black text-lg" style="color:${m.s1>m.s2?t1.color:"#6b7280"}">${m.s1}</span>
       <span class="text-gray-500 text-sm mx-1">x</span>
       <span class="font-black text-lg" style="color:${m.s2>m.s1?t2.color:"#6b7280"}">${m.s2}</span>`
    : `<span class="text-gray-500 text-xs">vs</span>`;
  return `
    <div class="card match-card p-3 cursor-pointer transition-all" onclick="openMatch('${m.id}')">
      <div class="flex items-center justify-between mb-1.5">
        <span class="text-[10px] text-gray-500">${m.phase} · Semana ${m.week} · ${formatDate(m.date)}</span>
        ${statusBadge(m.status)}
      </div>
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2 flex-1">
          <span class="text-xl">${t1.emoji}</span>
          <span class="font-bold text-sm" style="color:${t1.color}">${t1.short}</span>
        </div>
        <div class="flex items-center gap-1 mx-2">${scoreHtml}</div>
        <div class="flex items-center gap-2 flex-1 justify-end">
          <span class="font-bold text-sm" style="color:${t2.color}">${t2.short}</span>
          <span class="text-xl">${t2.emoji}</span>
        </div>
      </div>
    </div>`;
}

function renderHome() {
  // Standings
  let stHtml = `<div class="overflow-x-auto"><table class="w-full text-xs">
    <thead><tr class="border-b border-gray-800">
      <th class="text-left py-2 px-3 text-gray-500 font-medium">#</th>
      <th class="text-left py-2 px-3 text-gray-500 font-medium">Time</th>
      <th class="text-center py-2 px-3 text-gray-500 font-medium">V</th>
      <th class="text-center py-2 px-3 text-gray-500 font-medium">D</th>
      <th class="text-right py-2 px-3 text-gray-500 font-medium">Pts</th>
    </tr></thead><tbody>`;
  STANDINGS.forEach((s,i) => {
    const t = TEAMS[s.team];
    const bg = i === 0 ? "bg-yellow-500/10" : i < 4 ? "bg-green-500/5" : "";
    stHtml += `<tr class="border-b border-gray-900 ${bg}">
      <td class="py-2 px-3 font-bold ${i<4?"text-green-400":"text-gray-500"}">${i+1}</td>
      <td class="py-2 px-3 flex items-center gap-2"><span>${t.emoji}</span><span class="font-semibold" style="color:${t.color}">${t.short}</span></td>
      <td class="py-2 px-3 text-center text-green-400 font-semibold">${s.w}</td>
      <td class="py-2 px-3 text-center text-red-400 font-semibold">${s.l}</td>
      <td class="py-2 px-3 text-right font-bold gold">${s.pts}</td>
    </tr>`;
  });
  stHtml += `</tbody></table></div>`;
  document.getElementById("standings-container").innerHTML = stHtml;

  // Upcoming
  const upcoming = MATCHES.filter(m => m.status === "scheduled").slice(0,3);
  document.getElementById("upcoming-container").innerHTML = upcoming.length
    ? upcoming.map(m => renderMatchCard(m, false)).join("")
    : `<div class="card p-4 text-center text-gray-500 text-sm">Nenhum jogo agendado.</div>`;

  // Results
  const results = MATCHES.filter(m => m.status === "completed").slice(-3).reverse();
  document.getElementById("results-container").innerHTML = results.length
    ? results.map(m => renderMatchCard(m)).join("")
    : `<div class="card p-4 text-center text-gray-500 text-sm">Nenhum resultado ainda.</div>`;
}

function renderAgenda() {
  const filtered = agendaFilter === "upcoming"
    ? MATCHES.filter(m => m.status === "scheduled" || m.status === "live")
    : MATCHES.filter(m => m.status === "completed").reverse();
  document.getElementById("agenda-container").innerHTML = filtered.length
    ? filtered.map(m => renderMatchCard(m)).join("")
    : `<div class="card p-4 text-center text-gray-500 text-sm">Nenhuma partida encontrada.</div>`;
}

function renderTimes() {
  const html = Object.entries(TEAMS).map(([id, t]) => {
    const roster = t.roster.map(p => `<span class="text-xs text-gray-400">${ROLE_ICON[p.role]} ${p.name}</span>`).join("  ");
    return `<div class="card p-4 cursor-pointer" onclick="openTeam('${id}')">
      <div class="flex items-center gap-3 mb-2">
        <span class="text-3xl">${t.emoji}</span>
        <div>
          <div class="font-bold text-base" style="color:${t.color}">${t.name}</div>
          <div class="text-xs text-gray-500">CBLOL 2026 Split 1</div>
        </div>
      </div>
      <div class="flex flex-wrap gap-x-3 gap-y-1">${roster}</div>
    </div>`;
  }).join("");
  document.getElementById("times-container").innerHTML = html;
}

function renderPlayers(filter) {
  const filtered = filter === "all" ? PLAYERS_STATS : PLAYERS_STATS.filter(p => p.role === filter);
  if (!filtered.length) {
    document.getElementById("players-container").innerHTML = `<div class="p-4 text-center text-gray-500 text-sm">Nenhum jogador encontrado.</div>`;
    return;
  }
  let html = `<div class="overflow-x-auto"><table class="w-full text-xs">
    <thead><tr class="border-b border-gray-800">
      <th class="text-left py-2 px-3 text-gray-500">#</th>
      <th class="text-left py-2 px-3 text-gray-500">Jogador</th>
      <th class="text-center py-2 px-3 text-gray-500">KDA</th>
      <th class="text-center py-2 px-3 text-gray-500">DPM</th>
      <th class="text-center py-2 px-3 text-gray-500">WR%</th>
      <th class="text-right py-2 px-3 text-gray-500">⭐ Rating</th>
    </tr></thead><tbody>`;
  filtered.forEach((p,i) => {
    const t = TEAMS[p.team];
    html += `<tr class="border-b border-gray-900 player-row transition-colors cursor-pointer">
      <td class="py-2.5 px-3 text-gray-500 font-medium">${i+1}</td>
      <td class="py-2.5 px-3">
        <div class="font-semibold">${p.name}</div>
        <div style="color:${t.color}" class="text-[10px]">${t.short} · ${ROLE_ICON[p.role]}</div>
      </td>
      <td class="py-2.5 px-3 text-center font-semibold text-green-400">${p.kda}</td>
      <td class="py-2.5 px-3 text-center text-gray-300">${p.dpm}</td>
      <td class="py-2.5 px-3 text-center text-blue-300">${p.wr}%</td>
      <td class="py-2.5 px-3 text-right font-black ${ratingColor(p.rating)}">${p.rating}</td>
    </tr>`;
  });
  html += `</tbody></table></div>`;
  document.getElementById("players-container").innerHTML = html;
}

function renderNews() {
  const html = NEWS.map(n => `
    <div class="card overflow-hidden cursor-pointer" onclick="openNews('${n.id}')">
      <div class="relative">
        <div class="h-28 bg-gradient-to-r from-[#111827] to-[#1f2937] flex items-center justify-center">
          <span class="text-5xl">🏆</span>
        </div>
        <span class="absolute top-2 left-2 bg-[#c89b3c] text-[#0a0e1a] text-[10px] font-bold px-2 py-0.5 rounded">${n.category}</span>
      </div>
      <div class="p-3">
        <div class="font-semibold text-sm mb-1 leading-snug">${n.title}</div>
        <div class="text-xs text-gray-400 mb-1">${n.summary}</div>
        <div class="text-[10px] text-gray-600">${formatDateShort(n.date)}</div>
      </div>
    </div>`).join("");
  document.getElementById("news-container").innerHTML = html;
}

// ==================== NAVIGATION ====================
function showSection(name) {
  ["home","agenda","times","jogadores","noticias"].forEach(s => {
    document.getElementById(`section-${s}`).classList.add("section-hidden");
    const tab = document.getElementById(`tab-${s}`);
    tab.classList.remove("tab-active");
    tab.classList.add("tab-inactive");
  });
  document.getElementById(`section-${name}`).classList.remove("section-hidden");
  const activeTab = document.getElementById(`tab-${name}`);
  activeTab.classList.add("tab-active");
  activeTab.classList.remove("tab-inactive");
  currentSection = name;
  if (name === "agenda") renderAgenda();
  if (name === "times") renderTimes();
  if (name === "noticias") renderNews();
  if (name === "jogadores") renderPlayers(playerFilter);
}

function setAgendaFilter(f) {
  agendaFilter = f;
  ["upcoming","completed"].forEach(x => {
    const btn = document.getElementById(`filter-${x}`);
    btn.classList.toggle("tab-active", x===f);
    btn.classList.toggle("tab-inactive", x!==f);
  });
  renderAgenda();
}

function filterPlayers(pos) {
  playerFilter = pos;
  ["all","top","jungle","mid","adc","support"].forEach(x => {
    const btn = document.getElementById(`pos-${x}`);
    if(btn){ btn.classList.toggle("tab-active", x===pos); btn.classList.toggle("tab-inactive", x!==pos); }
  });
  renderPlayers(pos);
}

// ==================== MODALS ====================
function openMatch(id) {
  const m = MATCHES.find(x => x.id === id);
  if(!m) return;
  const t1 = TEAMS[m.t1], t2 = TEAMS[m.t2];
  const standing1 = STANDINGS.find(s => s.team === m.t1);
  const standing2 = STANDINGS.find(s => s.team === m.t2);
  const champions = ["Jinx","Aphelios","Caitlyn","Jhin","Ezreal","KaiSa","Xayah","Lucian","Corki"];
  const picks1 = champions.sort(()=>Math.random()-0.5).slice(0,5);
  const picks2 = champions.sort(()=>Math.random()-0.5).slice(0,5);
  let html = `
    <div class="text-center mb-4">
      <div class="text-xs text-gray-500 mb-2">${m.phase} · Semana ${m.week} · ${formatDate(m.date)}</div>
      <div class="flex items-center justify-center gap-6">
        <div class="text-center"><div class="text-3xl mb-1">${t1.emoji}</div><div class="font-bold" style="color:${t1.color}">${t1.name}</div><div class="text-xs text-gray-500">${standing1?.w}V ${standing1?.l}D</div></div>
        <div class="text-center">`;
  if(m.status === "completed") {
    html += `<div class="text-3xl font-black"><span style="color:${m.s1>m.s2?t1.color:"#6b7280"}">${m.s1}</span><span class="text-gray-600 mx-2 text-xl">x</span><span style="color:${m.s2>m.s1?t2.color:"#6b7280"}">${m.s2}</span></div><div class="text-xs text-green-400 mt-1">${m.s1>m.s2?t1.short:t2.short} venceu</div>`;
  } else {
    html += `<div class="text-gray-400 font-bold">vs</div><div class="text-xs text-blue-400 mt-1">Agendado</div>`;
  }
  html += `</div><div class="text-center"><div class="text-3xl mb-1">${t2.emoji}</div><div class="font-bold" style="color:${t2.color}">${t2.name}</div><div class="text-xs text-gray-500">${standing2?.w}V ${standing2?.l}D</div></div>
      </div>
    </div>`;
  if(m.status === "completed") {
    html += `<div class="border-t border-gray-800 pt-3 mt-2">
      <div class="text-xs font-semibold text-gray-400 uppercase mb-2">Draft — Jogo 1</div>
      <div class="grid grid-cols-2 gap-2">
        <div>
          <div class="text-xs text-blue-400 mb-1 font-semibold">🔵 Blue — ${t1.short}</div>
          ${t1.roster.map((p,i) => `<div class="flex items-center gap-2 mb-1.5"><div class="w-7 h-7 bg-blue-900 rounded text-center text-xs flex items-center justify-center">${picks1[i]?picks1[i][0]:"?"}</div><div><div class="text-xs font-medium">${p.name}</div><div class="text-[10px] text-gray-500">${picks1[i]||"?"}</div></div></div>`).join("")}
        </div>
        <div>
          <div class="text-xs text-red-400 mb-1 font-semibold">🔴 Red — ${t2.short}</div>
          ${t2.roster.map((p,i) => `<div class="flex items-center gap-2 mb-1.5"><div class="w-7 h-7 bg-red-900 rounded text-center text-xs flex items-center justify-center">${picks2[i]?picks2[i][0]:"?"}</div><div><div class="text-xs font-medium">${p.name}</div><div class="text-[10px] text-gray-500">${picks2[i]||"?"}</div></div></div>`).join("")}
        </div>
      </div>
    </div>
    <div class="border-t border-gray-800 pt-3 mt-2">
      <div class="text-xs font-semibold text-gray-400 uppercase mb-2">KDA — Jogo 1</div>
      ${[...t1.roster, ...t2.roster].map(p => {
        const kills = Math.floor(Math.random()*8)+1;
        const deaths = Math.floor(Math.random()*4)+1;
        const assists = Math.floor(Math.random()*12)+2;
        const kda = deaths === 0 ? "Perfect" : ((kills+assists)/deaths).toFixed(1);
        const team = t1.roster.includes(p) ? t1 : t2;
        return `<div class="flex items-center justify-between py-1 border-b border-gray-900">
          <div class="flex items-center gap-2"><span class="text-xs">${ROLE_ICON[p.role]}</span><span class="text-xs font-medium">${p.name}</span><span class="text-[10px]" style="color:${team.color}">${team.short}</span></div>
          <div class="text-xs font-bold text-gray-300">${kills}/<span class="text-red-400">${deaths}</span>/${assists} <span class="text-gray-500 font-normal">(${kda})</span></div>
        </div>`;
      }).join("")}
    </div>`;
  }
  document.getElementById("modal-content").innerHTML = html;
  document.getElementById("match-modal").classList.remove("hidden");
  document.body.style.overflow = "hidden";
}

function openTeam(id) {
  const t = TEAMS[id];
  const standing = STANDINGS.find(s => s.team === id);
  const teamMatches = MATCHES.filter(m => (m.t1 === id || m.t2 === id) && m.status === "completed");
  let html = `
    <div class="text-center mb-4">
      <div class="text-5xl mb-2">${t.emoji}</div>
      <div class="font-black text-xl" style="color:${t.color}">${t.name}</div>
      <div class="text-sm text-gray-400 mt-1">CBLOL 2026 Split 1</div>
      <div class="flex justify-center gap-6 mt-3">
        <div class="text-center"><div class="text-2xl font-black text-green-400">${standing?.w||0}</div><div class="text-xs text-gray-500">Vitórias</div></div>
        <div class="text-center"><div class="text-2xl font-black text-red-400">${standing?.l||0}</div><div class="text-xs text-gray-500">Derrotas</div></div>
        <div class="text-center"><div class="text-2xl font-black gold">${standing?.pts||0}</div><div class="text-xs text-gray-500">Pontos</div></div>
      </div>
    </div>
    <div class="border-t border-gray-800 pt-3">
      <div class="text-xs font-semibold text-gray-400 uppercase mb-2">Elenco Atual</div>
      ${t.roster.map(p => `<div class="flex items-center justify-between py-2 border-b border-gray-900">
        <div class="flex items-center gap-2"><span>${ROLE_ICON[p.role]}</span><span class="font-semibold text-sm">${p.name}</span></div>
        <span class="text-xs text-gray-500 capitalize">${p.role}</span>
      </div>`).join("")}
    </div>`;
  if(teamMatches.length) {
    html += `<div class="border-t border-gray-800 pt-3 mt-2">
      <div class="text-xs font-semibold text-gray-400 uppercase mb-2">Resultados Recentes</div>
      ${teamMatches.slice(-3).reverse().map(m => {
        const isT1 = m.t1 === id;
        const opp = TEAMS[isT1 ? m.t2 : m.t1];
        const myScore = isT1 ? m.s1 : m.s2;
        const oppScore = isT1 ? m.s2 : m.s1;
        const won = myScore > oppScore;
        return `<div class="flex items-center justify-between py-2 border-b border-gray-900">
          <div class="flex items-center gap-2"><span>${won?"🟢":"🔴"}</span><span class="text-xs text-gray-300">vs ${opp.emoji} ${opp.short}</span></div>
          <span class="text-xs font-bold ${won?"text-green-400":"text-red-400"}">${myScore}x${oppScore} ${won?"✓":"✗"}</span>
        </div>`;
      }).join("")}
    </div>`;
  }
  document.getElementById("modal-content").innerHTML = html;
  document.getElementById("match-modal").classList.remove("hidden");
  document.body.style.overflow = "hidden";
}

function openNews(id) {
  const n = NEWS.find(x => x.id === id);
  if(!n) return;
  const html = `
    <div>
      <div class="h-32 bg-gradient-to-r from-[#111827] to-[#1f2937] rounded-lg flex items-center justify-center mb-4">
        <span class="text-6xl">🏆</span>
      </div>
      <span class="bg-[#c89b3c] text-[#0a0e1a] text-[10px] font-bold px-2 py-0.5 rounded">${n.category}</span>
      <h2 class="text-base font-bold mt-2 mb-1 leading-snug">${n.title}</h2>
      <div class="text-xs text-gray-500 mb-3">${formatDateShort(n.date)}</div>
      <p class="text-sm text-gray-300 leading-relaxed">${n.summary} Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation.</p>
    </div>`;
  document.getElementById("modal-content").innerHTML = html;
  document.getElementById("match-modal").classList.remove("hidden");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  document.getElementById("match-modal").classList.add("hidden");
  document.body.style.overflow = "";
}

// Close modal on backdrop click
document.getElementById("match-modal").addEventListener("click", function(e) {
  if(e.target === this) closeModal();
});

// ==================== INIT ====================
document.getElementById("last-updated").textContent = "Atualizado: " + new Date().toLocaleTimeString("pt-BR", {hour:"2-digit",minute:"2-digit"});
renderHome();
</script>
